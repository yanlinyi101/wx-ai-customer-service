async function deleteAgent(username) {
  if (!confirm(`确认删除账号 ${username}？此操作不可撤销。`)) return;
  try {
    const res = await fetch(`${scfUrl}/admin/agents/${encodeURIComponent(username)}?token=${encodeURIComponent(token)}`, {
      method: 'DELETE',
    });
    const data = await res.json();
    if (data.ok) { showToast('账号已删除'); loadAgentsList(); }
    else showToast('删除失败：' + (data.error || ''));
  } catch(e) { showToast('网络错误'); }
}

let toastTimer;
function showToast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 2500);
}

// ── 客户备注 ──────────────────────────────────────────────────────────────────
async function loadNote(openid) {
  const bar = document.getElementById('note-bar');
  if (!bar || !scfUrl || !token) return;
  bar.style.display = '';
  try {
    const res = await fetch(
      `${scfUrl}/admin/notes/${encodeURIComponent(openid)}?token=${encodeURIComponent(token)}`,
      { signal: AbortSignal.timeout(8000) }
    );
    const data = await res.json();
    if (data.ok) renderNote(data);
  } catch(e) {}
}

function renderNote(data) {
  const display = document.getElementById('note-display');
  const meta = document.getElementById('note-meta');
  if (!display) return;
  if (data.note) {
    display.textContent = data.note;
    display.classList.add('has-note');
  } else {
    display.textContent = '— 点击添加备注';
    display.classList.remove('has-note');
  }
  if (data.updated_by && data.updated_at) {
    const t = new Date(data.updated_at * 1000);
    const pad = n => String(n).padStart(2, '0');
    meta.textContent = `${data.updated_by} · ${pad(t.getMonth()+1)}-${pad(t.getDate())} ${pad(t.getHours())}:${pad(t.getMinutes())}`;
  } else {
    if (meta) meta.textContent = '';
  }
}

function startEditNote() {
  const display = document.getElementById('note-display');
  const editDiv = document.getElementById('note-edit');
  const input = document.getElementById('note-input');
  const counter = document.getElementById('note-counter');
  if (!display || !editDiv) return;
  const current = display.classList.contains('has-note') ? display.textContent : '';
  input.value = current;
  counter.textContent = current.length + '/200';
  display.style.display = 'none';
  editDiv.style.display = '';
  input.focus();
}

async function saveNote() {
  const input = document.getElementById('note-input');
  const note = input.value.trim();
  if (note.length > 200) { showToast('备注不能超过200字'); return; }
  if (!currentOpenid) return;
  try {
    const res = await fetch(
      `${scfUrl}/admin/notes/${encodeURIComponent(currentOpenid)}?token=${encodeURIComponent(token)}`,
      {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ note, agent_name: agentName }),
      }
    );
    const data = await res.json();
    if (data.ok) {
      showToast('备注已保存');
      cancelEditNote();
      loadNote(currentOpenid);
    } else {
      showToast('保存失败：' + (data.error || ''));
    }
  } catch(e) { showToast('网络错误'); }
}

function cancelEditNote() {
  const nd = document.getElementById('note-display');
  const ne = document.getElementById('note-edit');
  if (nd) nd.style.display = '';
  if (ne) ne.style.display = 'none';
}

// ── 常用语模板 ────────────────────────────────────────────────────────────────
async function fetchQuickReplies() {
  if (!scfUrl || !token || !agentName) return;
  try {
    const res = await fetch(
      `${scfUrl}/admin/quick_replies?token=${encodeURIComponent(token)}&agent_name=${encodeURIComponent(agentName)}`,
      { signal: AbortSignal.timeout(8000) }
    );
    const data = await res.json();
    if (data.ok) agentQuickReplies = data.quick_replies || [];
  } catch(e) {}
}

function toggleQuickPanel() {
  const panel = document.getElementById('quick-reply-panel');
  if (!panel) return;
  const isHidden = panel.style.display === 'none' || !panel.style.display;
  if (!isHidden) { panel.style.display = 'none'; return; }
  renderQuickReplyList();
  panel.style.display = 'flex';
  panel.style.flexDirection = 'column';
}

function renderQuickReplyList() {
  const list = document.getElementById('quick-reply-list');
  if (!list) return;
  if (agentQuickReplies.length === 0) {
    list.innerHTML = '<div style="padding:16px;font-size:12px;color:var(--text-4);text-align:center;">暂无常用语，点击下方管理</div>';
    return;
  }
  list.innerHTML = '';
  agentQuickReplies.forEach((text, idx) => {
    const div = document.createElement('div');
    div.className = 'quick-reply-item';
    div.title = text;
    const span = document.createElement('span');
    span.textContent = text;
    span.style.cssText = 'flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;';
    span.onclick = () => insertQuickReply(text);
    const del = document.createElement('button');
    del.textContent = '✕';
    del.title = '删除';
    del.style.cssText = 'background:none;border:none;cursor:pointer;color:var(--red);font-size:12px;flex-shrink:0;padding:0 0 0 6px;opacity:0.6;transition:opacity 0.15s;';
    del.onmouseenter = () => del.style.opacity = '1';
    del.onmouseleave = () => del.style.opacity = '0.6';
    del.onclick = async (e) => { e.stopPropagation(); await deleteQuickReply(idx); };
    div.style.cssText = 'display:flex;align-items:center;';
    div.appendChild(span);
    div.appendChild(del);
    list.appendChild(div);
  });
}

function insertQuickReply(text) {
  const inp = document.getElementById('reply-input');
  if (inp) inp.value = (inp.value ? inp.value + '\n' : '') + text;
  document.getElementById('quick-reply-panel').style.display = 'none';
  if (inp) inp.focus();
}

function openQuickManage() {
  document.getElementById('quick-reply-panel').style.display = 'none';
  renderQuickManageList();
  document.getElementById('quick-manage-modal').style.display = 'flex';
}

function closeQuickManage() {
  document.getElementById('quick-manage-modal').style.display = 'none';
  document.getElementById('quick-new-input').value = '';
}

function renderQuickManageList() {
  const list = document.getElementById('quick-items-list');
  if (!list) return;
  list.innerHTML = '';
  if (agentQuickReplies.length === 0) {
    list.innerHTML = '<div style="padding:12px;font-size:12px;color:var(--text-4);text-align:center;">暂无常用语，请在下方添加</div>';
    return;
  }
  agentQuickReplies.forEach((text, idx) => {
    const div = document.createElement('div');
    div.className = 'quick-manage-item';
    div.innerHTML = `<span title="${escHtml(text)}">${escHtml(text)}</span><button onclick="deleteQuickReply(${idx})" title="删除">✕</button>`;
    list.appendChild(div);
  });
}

async function addQuickReply() {
  const input = document.getElementById('quick-new-input');
  const text = input.value.trim();
  if (!text) { showToast('请输入常用语内容'); return; }
  if (text.length > 100) { showToast('常用语最多100字'); return; }
  if (agentQuickReplies.length >= 20) { showToast('常用语最多20条'); return; }
  const newReplies = [...agentQuickReplies, text];
  const ok = await saveQuickReplies(newReplies);
  if (ok) { input.value = ''; renderQuickManageList(); showToast('已添加'); }
}

async function deleteQuickReply(idx) {
  const newReplies = agentQuickReplies.filter((_, i) => i !== idx);
  const ok = await saveQuickReplies(newReplies);
  if (ok) { renderQuickReplyList(); renderQuickManageList(); showToast('已删除'); }
}

async function saveQuickReplies(newReplies) {
  try {
    const res = await fetch(`${scfUrl}/admin/quick_replies?token=${encodeURIComponent(token)}`, {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ agent_name: agentName, quick_replies: newReplies }),
    });
    const data = await res.json();
    if (data.ok) { agentQuickReplies = newReplies; return true; }
    showToast('保存失败：' + (data.error || ''));
    return false;
  } catch(e) { showToast('网络错误'); return false; }
}
</script>
